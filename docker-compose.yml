version: '3.8'

services:
  # Clara Answers Pipeline - Express API + Dashboard
  clara-app:
    build: .
    container_name: clara-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - RATE_LIMIT_DELAY_MS=${RATE_LIMIT_DELAY_MS:-2500}
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    restart: unless-stopped
    networks:
      - clara-network

  # n8n Workflow Engine (self-hosted, free)
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: clara-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/New_York
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows
    restart: unless-stopped
    networks:
      - clara-network
    depends_on:
      - clara-app

volumes:
  n8n_data:

networks:
  clara-network:
    driver: bridge
